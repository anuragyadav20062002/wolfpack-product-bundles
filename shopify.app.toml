# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a383172f42c2ab283901a663d485a03d"
name = "Wolfpack: Product Bundles"
application_url = "https://wolfpack-product-bundle-app.onrender.com"
embedded = true
handle = "wolfpack-product-bundles-4"

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "pubsub://light-quest-455608-i3:wolfpack-only-bundles"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_content,read_product_listings,read_products,read_themes,unauthenticated_read_content,unauthenticated_read_product_listings,write_cart_transforms,write_discounts,write_online_store_pages,write_products,write_themes"

[auth]
redirect_urls = [
  "https://wolfpack-product-bundle-app.onrender.com/auth/callback",
  "https://wolfpack-product-bundle-app.onrender.com/auth/shopify/callback",
  "https://wolfpack-product-bundle-app.onrender.com/api/auth/callback"
]

[app_proxy]
url = "https://wolfpack-product-bundle-app.onrender.com"
subpath = "product-bundles"
prefix = "apps"

[pos]
embedded = false

[metafields]
api_version = "2025-10"

[shop.metafields.app.serverUrl]
type = "single_line_text_field"
name = "App Server URL"
description = "URL of the app server for widget API calls"

  [shop.metafields.app.serverUrl.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[shop.metafields.app.lastSync]
type = "single_line_text_field"
name = "Last Sync Timestamp"
description = "ISO timestamp of last successful sync with app server"

  [shop.metafields.app.lastSync.access]
  admin = "merchant_read"
  storefront = "none"
