# Learn more about configuring your checkout UI extension:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration

# The version of APIs your extension will receive. Learn more:
# https://shopify.dev/docs/api/usage/versioning
api_version = "2025-10"

# =============================================================================
# Extension 1: Checkout Page - Cart Line Item
# Static target that auto-renders after each cart line in checkout
# =============================================================================
[[extensions]]
type = "ui_extension"
name = "Bundle Pricing - Checkout"
handle = "bundle-checkout-ui-checkout"

  [[extensions.targeting]]
  module = "./src/index.tsx"
  target = "purchase.checkout.cart-line-item.render-after"

  [extensions.capabilities]
  api_access = true

# =============================================================================
# Extension 2: Thank You Page - Cart Line Item
# Static target that auto-renders after each cart line on thank-you page
# =============================================================================
[[extensions]]
type = "ui_extension"
name = "Bundle Pricing - Thank You"
handle = "bundle-checkout-ui-thankyou"

  [[extensions.targeting]]
  module = "./src/index.tsx"
  target = "purchase.thank-you.cart-line-item.render-after"

  [extensions.capabilities]
  api_access = true
