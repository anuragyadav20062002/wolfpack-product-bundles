name = "bundle-builder"

[build]
asset_dir = "assets"

[[extensions]]
name = "bundle-builder"

type = "theme"
handle = "bundle-builder"
api_version = "2025-10"

[[extensions.blocks]]
target = "all"
liquid_path = "blocks/bundle-product-page.liquid"

# Full-Page Bundle Block (for standalone pages)
[[extensions.blocks]]
target = "section"
liquid_path = "blocks/bundle-full-page.liquid"

