type = "web_pixel_extension"
name = "Wolfpack UTM Attribution Pixel"
handle = "wolfpack-utm-pixel"
runtime_context = "strict"

[customer_privacy]
analytics = true
marketing = true
preferences = false
sale_of_data = "disabled"

[settings]
type = "object"

[settings.fields.app_server_url]
name = "App Server URL"
description = "The URL of the Wolfpack app server for attribution tracking"
type = "single_line_text_field"
validations = [{ name = "min", value = "1" }]
