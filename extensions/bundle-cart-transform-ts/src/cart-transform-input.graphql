query Input {
  cart {
    lines {
      id
      quantity
      bundleId: attribute(key: "_bundle_id") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            # NEW: Read lightweight cart transform config (~500 bytes)
            cartTransformConfig: metafield(namespace: "$app", key: "cart_transform_config") {
              value
            }
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
        }
        totalAmount {
          amount
        }
      }
    }
  }
}
