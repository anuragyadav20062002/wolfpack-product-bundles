query Input {
  cart {
    lines {
      id
      quantity
      bundleId: attribute(key: "_bundle_id") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            bundle_config: metafield(namespace: "$app", key: "bundle_config") {
              value
            }
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
        }
        totalAmount {
          amount
        }
      }
    }
  }
  shop {
    all_bundles: metafield(namespace: "custom", key: "all_bundles") {
      value
    }
  }
}
