query Input {
  cart {
    lines {
      id
      quantity
      attribute(key: "_wolfpack_bundle_id") {
        value
      }
      bundleConfig: attribute(key: "_bundle_config") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            bundle_config: metafield(namespace: "$app", key: "bundle_config") {
              value
            }
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
        }
        totalAmount {
          amount
        }
      }
    }
  }
}
