query BundleCartTransformInput {
  cart {
    lines {
      id
      quantity
      attribute(key: "_wolfpack_bundle_id") {
        key
        value
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            title
            handle
            metafield(namespace: "bundle_discounts", key: "cart_transform_config") {
              value
            }
          }
          # Standard Shopify bundle metafields for cart transform
          componentReference: metafield(namespace: "custom", key: "component_reference") {
            value
          }
          componentQuantities: metafield(namespace: "custom", key: "component_quantities") {
            value
          }
          componentParents: metafield(namespace: "custom", key: "component_parents") {
            value
          }
          # Our custom bundle configuration
          bundleConfig: metafield(namespace: "bundle_discounts", key: "cart_transform_config") {
            value
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
        totalAmount {
          amount
          currencyCode
        }
      }
    }
  }
  shop {
    metafield(namespace: "custom", key: "all_bundles") {
      value
      jsonValue
    }
  }
}