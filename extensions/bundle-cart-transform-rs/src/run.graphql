query Input {
  presentmentCurrencyRate
  cartTransform {
    bundleCartLineMessaging: metafield(namespace: "$app", key: "bundle_cart_line_messaging") {
      value
    }
    runtimeTokenSecret: metafield(namespace: "$app", key: "runtime_token_secret") {
      value
    }
  }
  cart {
    lines {
      id
      quantity
      wolfpackProductBundleOfferId: attribute(key: "_wolfpackProductBundle:OfferId") {
        value
      }
      wolfpackProductBundleName: attribute(key: "_bundleName") {
        value
      }
      runtimeToken: attribute(key: "_wolfpack_bundle_runtime") {
        value
      }
      stepType: attribute(key: "_bundle_step_type") {
        value
      }
      bundleDisplayProperties: attribute(key: "_bundle_display_properties") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          # For EXPAND: Check if this variant is a bundle parent
          component_reference: metafield(namespace: "$app", key: "component_reference") {
            value
          }

          component_quantities: metafield(namespace: "$app", key: "component_quantities") {
            value
          }

          # Price adjustment configuration for discounting
          price_adjustment: metafield(namespace: "$app", key: "price_adjustment") {
            value
          }

          # Component pricing for expanded checkout display (cents-based)
          component_pricing: metafield(namespace: "$app", key: "component_pricing") {
            value
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
        }
      }
    }
  }
}
